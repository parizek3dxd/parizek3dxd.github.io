<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Drone Frame Customizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; width: 280px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; max-height: 90vh; overflow-y: auto; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        select, input, button { width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; margin-bottom: 5px; }
        button { background: #007bff; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .export-btn { background: #28a745; margin-top: 10px; }
        .stats { font-size: 0.75em; color: #00ff88; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h3>Drone Customizer</h3>
    
    <div class="control-group">
        <label>Presets</label>
        <select id="preset">
            <option value="5">5 Inch Freestyle</option>
            <option value="3.5">3.5 Inch Cine</option>
            <option value="whoop">Tiny Whoop (65mm)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Wheelbase (mm)</label>
        <input type="range" id="wheelbase" min="65" max="300" value="225">
        <label>Arm Width (mm)</label>
        <input type="range" id="armWidth" min="4" max="15" value="10">
        <label>Plate Thickness (mm)</label>
        <input type="range" id="thickness" min="1" max="6" step="0.5" value="4">
    </div>

    <div class="control-group">
        <label>Frame Type</label>
        <select id="frameType">
            <option value="single">Single Plate</option>
            <option value="stack">Stack (2-Plate)</option>
        </select>
        <label id="stackLabel" style="display:none;">Standoff Height (mm)</label>
        <input type="range" id="standoff" min="15" max="35" value="25" style="display:none;">
    </div>

    <div class="control-group">
        <label>Weight Reduction</label>
        <select id="lighten">
            <option value="none">Solid (Strongest)</option>
            <option value="intelligent">Intelligent Cutouts</option>
        </select>
        <label>Material (3D Print Stats)</label>
        <select id="material">
            <option value="1.25">PLA (Heavy/Stiff)</option>
            <option value="1.04">ABS (Light/Durable)</option>
            <option value="1.27">PETG (Flexible/Strong)</option>
        </select>
    </div>

    <div class="stats" id="statsDisplay">Estimated Weight: 0g</div>
    <button class="export-btn" onclick="exportSTL()">EXPORT .STL</button>
</div>

<script>
    let scene, camera, renderer, controls, frameMesh;
    const exporter = new THREE.STLExporter();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(150, 150, 150);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        
        // Grid
        const grid = new THREE.GridHelper(400, 40, 0x444444, 0x222222);
        grid.rotation.x = Math.PI/2;
        scene.add(grid);

        updateFrame();

        // Listeners
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => {
                if (el.id === 'preset') applyPreset();
                if (el.id === 'frameType') toggleStackUI();
                updateFrame();
            });
        });
    }

    function applyPreset() {
        const p = document.getElementById('preset').value;
        if (p === '5') { setVals(225, 12, 4); }
        else if (p === '3.5') { setVals(150, 8, 3); }
        else if (p === 'whoop') { setVals(65, 5, 1.5); }
    }

    function setVals(wb, aw, th) {
        document.getElementById('wheelbase').value = wb;
        document.getElementById('armWidth').value = aw;
        document.getElementById('thickness').value = th;
    }

    function toggleStackUI() {
        const isStack = document.getElementById('frameType').value === 'stack';
        document.getElementById('standoff').style.display = isStack ? 'block' : 'none';
        document.getElementById('stackLabel').style.display = isStack ? 'block' : 'none';
    }

    function updateFrame() {
        if (frameMesh) scene.remove(frameMesh);

        const wb = parseFloat(document.getElementById('wheelbase').value);
        const aw = parseFloat(document.getElementById('armWidth').value);
        const th = parseFloat(document.getElementById('thickness').value);
        const type = document.getElementById('frameType').value;
        const lighten = document.getElementById('lighten').value;
        const densityMultiplier = parseFloat(document.getElementById('material').value);

        const group = new THREE.Group();
        const material = new THREE.MeshPhongMaterial({ color: 0x555555, flatShading: true });

        // Logic for creating the shape
        const createPlate = (zPos) => {
            const shape = new THREE.Shape();
            const armLen = wb / 2;
            
            // Central Hub
            shape.absarc(0, 0, aw * 1.5, 0, Math.PI * 2);

            // 4 Arms
            for (let i = 0; i < 4; i++) {
                const angle = (Math.PI / 4) + (i * Math.PI / 2);
                const x = Math.cos(angle) * armLen;
                const y = Math.sin(angle) * armLen;
                
                // Simplified Arm Geometry
                shape.moveTo(Math.cos(angle + 0.2) * (aw), Math.sin(angle + 0.2) * (aw));
                shape.lineTo(x, y);
                shape.lineTo(Math.cos(angle - 0.2) * (aw), Math.sin(angle - 0.2) * (aw));
            }

            // Intelligent Weight Reduction Holes
            if (lighten === 'intelligent') {
                for (let i = 0; i < 4; i++) {
                    const hole = new THREE.Path();
                    const angle = (i * Math.PI / 2);
                    hole.absarc(Math.cos(angle) * (aw * 2), Math.sin(angle) * (aw * 2), aw / 2, 0, Math.PI * 2, true);
                    shape.holes.push(hole);
                }
            }

            const extrudeSettings = { depth: th, bevelEnabled: false };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.z = zPos;
            return mesh;
        };

        group.add(createPlate(0));
        
        if (type === 'stack') {
            const stHeight = parseFloat(document.getElementById('standoff').value);
            group.add(createPlate(stHeight));
            
            // Simple Standoffs (visual representation)
            const stGeom = new THREE.CylinderGeometry(2, 2, stHeight, 8);
            for (let i = 0; i < 4; i++) {
                const s = new THREE.Mesh(stGeom, new THREE.MeshPhongMaterial({color: 0x999999}));
                const dist = aw * 1.2;
                s.position.set(i < 2 ? dist : -dist, i % 2 === 0 ? dist : -dist, stHeight/2);
                s.rotation.x = Math.PI/2;
                group.add(s);
            }
        }

        frameMesh = group;
        scene.add(frameMesh);

        // Calculate Weight (Rough Volume * Density)
        // Average volume calc: (wb * aw * th) * correction factor
        const estVol = (wb * aw * th * 0.001) * (type === 'stack' ? 1.8 : 1);
        const weight = (estVol * densityMultiplier).toFixed(1);
        document.getElementById('statsDisplay').innerText = `Estimated Weight: ${weight}g`;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function exportSTL() {
        const result = exporter.parse(frameMesh);
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'custom_drone_frame.stl';
        link.click();
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
