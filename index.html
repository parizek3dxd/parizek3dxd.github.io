<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroGen - Drone Frame Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --text-main: #1f2937;
            --text-sec: #4b5563;
            --accent: #3b82f6;
            --border: #e5e7eb;
        }
        
        .dark {
            --bg-color: #111827;
            --panel-bg: #1f2937;
            --text-main: #f9fafb;
            --text-sec: #9ca3af;
            --accent: #60a5fa;
            --border: #374151;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .panel {
            background-color: var(--panel-bg);
            border-color: var(--border);
        }

        input[type="range"] {
            accent-color: var(--accent);
        }

        #canvas-container {
            background: radial-gradient(circle at center, #2d3748 0%, #111827 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .dark #canvas-container {
            background: radial-gradient(circle at center, #1f2937 0%, #000000 100%);
        }

        .loader {
            border: 4px solid var(--panel-bg);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden font-sans">

    <!-- Sidebar Controls -->
    <aside class="w-full md:w-80 flex-shrink-0 panel border-b md:border-b-0 md:border-r border-[var(--border)] p-6 overflow-y-auto z-10 shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-600">AeroGen</h1>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                🌙
            </button>
        </div>

        <div class="space-y-6">
            <!-- Preset -->
            <div>
                <label class="block text-sm font-medium mb-2">Size Preset</label>
                <select id="preset" class="w-full p-2 rounded border bg-transparent border-[var(--border)] focus:outline-none focus:border-[var(--accent)]">
                    <option value="5">5 Inch (Standard)</option>
                    <option value="3.5">3.5 Inch (Lightweight)</option>
                    <option value="3">3 Inch (Micro)</option>
                    <option value="tiny">Tiny Whoop (65mm)</option>
                </select>
            </div>

            <!-- Configuration -->
            <div>
                <label class="block text-sm font-medium mb-2">Frame Type</label>
                <select id="frameType" class="w-full p-2 rounded border bg-transparent border-[var(--border)] focus:outline-none focus:border-[var(--accent)]">
                    <option value="plate">Single Plate</option>
                    <option value="stack">Stack (Multi-Layer)</option>
                </select>
            </div>

            <!-- Sliders -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs mb-1">Arm Length</label>
                    <input type="range" id="armLen" min="30" max="150" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs mb-1">Arm Width</label>
                    <input type="range" id="armWidth" min="5" max="40" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs mb-1">Plate Thickness</label>
                    <input type="range" id="thickness" min="1" max="6" step="0.5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div id="stackControls" class="hidden">
                    <label class="block text-xs mb-1">Stack Layers</label>
                    <input type="range" id="layers" min="2" max="4" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- Materials -->
            <div>
                <label class="block text-sm font-medium mb-2">Material</label>
                <div class="flex gap-2 bg-[var(--bg-color)] p-1 rounded">
                    <button class="material-btn flex-1 py-1 text-xs rounded selected" data-mat="pla">PLA</button>
                    <button class="material-btn flex-1 py-1 text-xs rounded" data-mat="petg">PETG</button>
                    <button class="material-btn flex-1 py-1 text-xs rounded" data-mat="abs">ABS</button>
                </div>
            </div>

            <!-- AI Optimize -->
            <div class="pt-4 border-t border-[var(--border)]">
                <button id="aiOptimize" class="w-full py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded font-semibold shadow hover:opacity-90 transition flex items-center justify-center gap-2">
                    <span>✨ AI Weight Reduce</span>
                </button>
                <p class="text-xs text-[var(--text-sec)] mt-2 text-center" id="aiStatus">Status: Standard</p>
            </div>
        </div>
    </aside>

    <!-- Main Area -->
    <main class="flex-1 flex flex-col relative">
        <!-- Stats Bar -->
        <div class="absolute top-4 left-4 z-20 panel rounded-lg p-3 shadow-lg border">
            <div class="text-xs text-[var(--text-sec)]">Est. Weight</div>
            <div class="text-xl font-bold" id="weightDisplay">0g</div>
            <div class="text-xs text-[var(--text-sec)] mt-1">Material: <span id="matDisplay">PLA</span></div>
        </div>

        <!-- 3D View -->
        <div id="canvas-container" class="flex-1 w-full h-full"></div>

        <!-- Footer / Export -->
        <div class="absolute bottom-4 right-4 z-20">
            <button id="exportBtn" class="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg flex items-center gap-2 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Export .STL
            </button>
        </div>
    </main>

    <script>
        // --- State & Config ---
        const state = {
            preset: '5',
            frameType: 'plate',
            armLength: 120,
            armWidth: 20,
            thickness: 3,
            layers: 3,
            material: 'pla',
            aiOptimized: false
        };

        const materials = {
            pla: { density: 1.24, name: "PLA" },
            petg: { density: 1.27, name: "PETG" },
            abs: { density: 1.04, name: "ABS" }
        };

        const presets = {
            '5': { armLen: 120, armWidth: 20, thick: 3 },
            '3.5': { armLen: 90, armWidth: 16, thick: 2.5 },
            '3': { armLen: 75, armWidth: 12, thick: 2 },
            'tiny': { armLen: 65, armWidth: 10, thick: 1.5 }
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(100, 100, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // Grid
        const gridHelper = new THREE.GridHelper(200, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // Frame Group
        let frameGroup = new THREE.Group();
        scene.add(frameGroup);

        // --- Core Generation Logic ---

        function createFrame() {
            // Clear previous
            while(frameGroup.children.length > 0){ 
                frameGroup.remove(frameGroup.children[0]); 
            }

            const materialColor = state.material === 'pla' ? 0x3b82f6 : (state.material === 'petg' ? 0x10b981 : 0xf59e0b);
            const mat = new THREE.MeshStandardMaterial({ 
                color: materialColor, 
                roughness: 0.5,
                metalness: 0.1,
                flatShading: true
            });

            // Calculate dimensions based on AI
            let activeThickness = state.thickness;
            let activeArmWidth = state.armWidth;
            let armShape = 'box';

            if (state.aiOptimized) {
                // AI Simulation: Carbon fiber style cuts and thinning
                activeThickness = Math.max(1, state.thickness * 0.6); // Thin down
                activeArmWidth = Math.max(4, state.armWidth * 0.7);  // Narrow
                armShape = 'carbon';
            }

            // Center Hub
            const hubGeo = new THREE.CylinderGeometry(activeArmWidth * 0.8, activeArmWidth * 0.8, activeThickness, 32);
            const hub = new THREE.Mesh(hubGeo, mat);
            
            // Create hole in hub (using CSG is heavy, simple visual trick: darker cylinder inside)
            const hubHole = new THREE.Mesh(
                new THREE.CylinderGeometry(10, 10, activeThickness + 0.1, 16),
                new THREE.MeshBasicMaterial({ color: 0x000000 }) // hole color
            );
            hub.add(hubHole);
            frameGroup.add(hub);

            // Arms
            const armLen = state.armLength;
            const armPositions = [
                { x: armLen/2, z: armLen/2, rot: Math.PI/4 },
                { x: -armLen/2, z: armLen/2, rot: -Math.PI/4 },
                { x: armLen/2, z: -armLen/2, rot: -Math.PI/4 },
                { x: -armLen/2, z: -armLen/2, rot: Math.PI/4 }
            ];

            armPositions.forEach(pos => {
                let armMesh;
                
                if (armShape === 'carbon') {
                    // Create arm with holes using Shape
                    const shape = new THREE.Shape();
                    const w = activeArmWidth;
                    const l = armLen;
                    
                    // Draw arm outline
                    shape.moveTo(-w/2, 0);
                    shape.lineTo(w/2, 0);
                    shape.lineTo(w/2, l - 10); // Leave gap at motor
                    shape.absarc(w/2, l, 10, -Math.PI/2, Math.PI/2, false); // Motor cutout
                    shape.lineTo(-w/2, 0);

                    // Cut holes (island strategy simplified - just small circles)
                    const hole1 = new THREE.Path();
                    hole1.moveTo(0, l/3);
                    hole1.absarc(0, l/3, w/4, 0, Math.PI*2, true);
                    shape.holes.push(hole1);

                    const extrudeSettings = { depth: activeThickness, bevelEnabled: false };
                    const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    geo.rotateX(-Math.PI/2); // Lay flat
                    geo.translate(0, activeThickness/2, 0); // Center Y
                    
                    armMesh = new THREE.Mesh(geo, mat);
                } else {
                    // Simple Box Arm
                    const geo = new THREE.BoxGeometry(activeArmWidth, activeThickness, armLen - 15); // -15 for motor gap
                    armMesh = new THREE.Mesh(geo, mat);
                    armMesh.position.y = activeThickness / 2;
                }

                armMesh.position.x = pos.x;
                armMesh.position.z = pos.z;
                armMesh.rotation.y = pos.rot;
                frameGroup.add(armMesh);
            });

            // Stack Logic
            if (state.frameType === 'stack') {
                const gap = 20; // standoff height
                const numLayers = state.layers;
                
                // Add standoffs
                const standoffGeo = new THREE.CylinderGeometry(3, 3, gap * (numLayers - 1), 8);
                const standoff = new THREE.Mesh(standoffGeo, mat);
                standoff.position.y = (numLayers-1) * gap / 2 + activeThickness;
                frameGroup.add(standoff);

                // Add additional plates
                for(let i = 1; i < numLayers; i++) {
                    const plateGeo = new THREE.CylinderGeometry(activeArmWidth * 0.8, activeArmWidth * 0.8, activeThickness, 32);
                    const pMesh = new THREE.Mesh(plateGeo, mat);
                    pMesh.position.y = i * gap;
                    frameGroup.add(pMesh);
                }
            }

            calculateWeight();
        }

        function calculateWeight() {
            // Approximate volume calculation (Box approximation for speed)
            let volume = 0;
            
            // Hub volume
            const hubR = (state.armWidth * 0.8);
            volume += Math.PI * hubR * hubR * state.thickness;

            // Arms volume
            const armVol = (state.armWidth * state.thickness * (state.armLength - 15));
            volume += armVol * 4;

            // Stack volume
            if (state.frameType === 'stack') {
                const gap = 20;
                const layers = state.layers;
                // Standoff volume
                volume += Math.PI * 3 * 3 * (gap * (layers - 1));
                // Extra plates
                volume += (Math.PI * hubR * hubR * state.thickness) * (layers - 1);
            }

            // AI Adjustment (approximate reduction)
            if (state.aiOptimized) {
                volume *= 0.65; // ~35% weight reduction simulated
            }

            // Convert cm3 (assuming unit = 1mm so divide by 1000) to grams
            const density = materials[state.material].density;
            const weight = (volume / 1000) * density;

            document.getElementById('weightDisplay').innerText = weight.toFixed(2) + 'g';
        }

        // --- UI Events ---

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            themeBtn.innerText = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        });

        // Inputs
        const presetSel = document.getElementById('preset');
        const typeSel = document.getElementById('frameType');
        const stackCtrl = document.getElementById('stackControls');
        
        // Update values based on preset
        presetSel.addEventListener('change', (e) => {
            const p = presets[e.target.value];
            state.preset = e.target.value;
            state.armLength = p.armLen;
            state.armWidth = p.armWidth;
            state.thickness = p.thick;
            
            // Update sliders
            document.getElementById('armLen').value = p.armLen;
            document.getElementById('armWidth').value = p.armWidth;
            document.getElementById('thickness').value = p.thick;
            
            createFrame();
        });

        typeSel.addEventListener('change', (e) => {
            state.frameType = e.target.value;
            if (e.target.value === 'stack') stackCtrl.classList.remove('hidden');
            else stackCtrl.classList.add('hidden');
            createFrame();
        });

        // Sliders
        document.getElementById('armLen').addEventListener('input', (e) => { state.armLength = parseInt(e.target.value); createFrame(); });
        document.getElementById('armWidth').addEventListener('input', (e) => { state.armWidth = parseInt(e.target.value); createFrame(); });
        document.getElementById('thickness').addEventListener('input', (e) => { state.thickness = parseFloat(e.target.value); createFrame(); });
        document.getElementById('layers').addEventListener('input', (e) => { state.layers = parseInt(e.target.value); createFrame(); });

        // Material
        document.querySelectorAll('.material-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('bg-blue-500', 'text-white'));
                btn.classList.add('bg-blue-500', 'text-white');
                state.material = btn.dataset.mat;
                document.getElementById('matDisplay').innerText = materials[state.material].name;
                createFrame();
            });
        });

        // AI Optimize
        document.getElementById('aiOptimize').addEventListener('click', () => {
            state.aiOptimized = !state.aiOptimized;
            const status = document.getElementById('aiStatus');
            if(state.aiOptimized) {
                status.innerText = "Status: Optimizing (Topology Simulation Active)";
                status.classList.add('text-purple-500');
            } else {
                status.innerText = "Status: Standard";
                status.classList.remove('text-purple-500');
            }
            createFrame();
        });

        // --- STL Export Logic ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            exportSTL();
        });

        function exportSTL() {
            const meshs = [];
            frameGroup.traverse((child) => {
                if (child.isMesh) {
                    // Get world matrix
                    child.updateMatrixWorld();
                    meshs.push(child);
                }
            });

            const geometry = mergeBufferGeometries(meshs);
            const exportMesh = new THREE.Mesh(geometry);
            
            // STL Writer
            const triangleCount = exportMesh.geometry.attributes.position.count / 3;
            const triangles = triangleCount;
            
            // Header (80 bytes) + triangle count (4 bytes) + data
            const bufferSize = 84 + triangles * 50;
            const buffer = new ArrayBuffer(bufferSize);
            const data = new DataView(buffer);

            // Header
            for(let i=0; i<80; i++) data.setUint8(i, 0);
            // Triangle count
            data.setUint32(80, triangles, true);

            const posAttr = exportMesh.geometry.attributes.position;
            const normAttr = exportMesh.geometry.attributes.normal;

            let offset = 84;
            
            for (let i = 0; i < triangles; i++) {
                // Normals
                const nx = normAttr.getX(i);
                const ny = normAttr.getY(i);
                const nz = normAttr.getZ(i);
                
                // Vertices (3)
                const v1x = posAttr.getX(i*3);
                const v1y = posAttr.getY(i*3);
                const v1z = posAttr.getZ(i*3);
                
                const v2x = posAttr.getX(i*3+1);
                const v2y = posAttr.getY(i*3+1);
                const v2z = posAttr.getZ(i*3+1);
                
                const v3x = posAttr.getX(i*3+2);
                const v3y = posAttr.getY(i*3+2);
                const v3z = posAttr.getZ(i*3+2);

                // Write Normal
                data.setFloat32(offset, nx, true); offset+=4;
                data.setFloat32(offset, ny, true); offset+=4;
                data.setFloat32(offset, nz, true); offset+=4;
                
                // Write Vertices
                data.setFloat32(offset, v1x, true); offset+=4;
                data.setFloat32(offset, v1y, true); offset+=4;
                data.setFloat32(offset, v1z, true); offset+=4;
                
                data.setFloat32(offset, v2x, true); offset+=4;
                data.setFloat32(offset, v2y, true); offset+=4;
                data.setFloat32(offset, v2z, true); offset+=4;
                
                data.setFloat32(offset, v3x, true); offset+=4;
                data.setFloat32(offset, v3y, true); offset+=4;
                data.setFloat32(offset, v3z, true); offset+=4;

                // Attribute byte count
                data.setUint16(offset, 0, true); offset+=2;
            }

            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `drone_frame_${state.preset}inch_${state.material}.stl`;
            link.click();
        }

        // Helper to merge geometries (Essential for STL export)
        function mergeBufferGeometries(meshes) {
            let geometries = [];
            
            meshes.forEach(mesh => {
                let geo = mesh.geometry.clone();
                // Apply world transform
                geo.applyMatrix4(mesh.matrixWorld);
                geometries.push(geo);
            });

            // Using Three.js mergeBufferGeometries requires an external util usually, 
            // but we can manually merge or assume standard geometry. 
            // Since we can't easily import mergeBufferGeometries in vanilla CDN without extra file,
            // We will use a simpler approach: create one large BufferGeometry.
            
            // Count total vertices
            let totalVertices = 0;
            geometries.forEach(g => totalVertices += g.attributes.position.count);

            const positions = new Float32Array(totalVertices * 3);
            const normals = new Float32Array(totalVertices * 3);

            let vertexOffset = 0;
            
            geometries.forEach(g => {
                const pos = g.attributes.position.array;
                const norm = g.attributes.normal.array;
                
                positions.set(pos, vertexOffset * 3);
                normals.set(norm, vertexOffset * 3);
                
                vertexOffset += g.attributes.position.count;
            });

            const mergedGeo = new THREE.BufferGeometry();
            mergedGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            mergedGeo.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
            
            return mergedGeo;
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Initialize
        createFrame();
        animate();

    </script>
</body>
</html>
