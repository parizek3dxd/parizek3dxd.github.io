<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Drone Frame Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        input[type=range] { width: 100%; height: 6px; background: #334155; border-radius: 5px; appearance: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        #canvas-container { border-radius: 12px; overflow: hidden; width: 100%; height: 500px; background: #020617; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-2">Drone Frame Customizer</h1>
            <p class="text-slate-400">Nastav parametry, prohlédni ve 3D a exportuj pro tisk</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Ovládací panel -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 space-y-6">
                    <h2 class="text-xl font-semibold border-b border-slate-700 pb-2">Konfigurace (mm)</h2>
                    
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Délka ramen: <span id="val-armL" class="text-blue-400 font-bold">140</span></label>
                        <input type="range" id="armL" min="50" max="250" value="140" oninput="updateFromSliders()">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Šířka ramen: <span id="val-armW" class="text-blue-400 font-bold">12</span></label>
                        <input type="range" id="armW" min="5" max="30" value="12" oninput="updateFromSliders()">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Délka těla: <span id="val-bodyL" class="text-blue-400 font-bold" >80</span></label>
                        <input type="range" id="bodyL" min="20" max="150" value="80" oninput="updateFromSliders()">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Šířka těla: <span id="val-bodyW" class="text-blue-400 font-bold">35</span></label>
                        <input type="range" id="bodyW" min="15" max="60" value="35" oninput="updateFromSliders()">
                    </div>

                    <div class="pt-4 space-y-3">
                        <button onclick="exportSTL()" class="w-full btn-primary text-white py-3 rounded-lg font-bold">📥 Exportovat STL</button>
                        <button onclick="resetCamera()" class="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm">🔄 Resetovat pohled</button>
                    </div>
                </div>
            </div>

            <!-- 3D Náhled -->
            <div class="lg:col-span-2">
                <div class="glass-card p-4">
                    <div id="canvas-container"></div>
                    <div class="mt-4 flex justify-between items-center text-xs text-slate-500">
                        <span>Levé tlačítko: Otáčení | Pravé: Posun | Kolečko: Zoom</span>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" onchange="toggleWireframe()"> Režim sítě (Wireframe)
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, droneGroup;
        let isWireframe = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / 500, 1, 2000);
            camera.position.set(180, 180, 180);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, 500);
            container.appendChild(renderer.domElement);

            // Světla pro plastový vzhled
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(100, 200, 100);
            scene.add(light1);
            const light2 = new THREE.PointLight(0x3b82f6, 0.5);
            light2.position.set(-100, -100, -100);
            scene.add(light2);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Mřížka
            const grid = new THREE.GridHelper(300, 30, 0x1e293b, 0x0f172a);
            scene.add(grid);

            droneGroup = new THREE.Group();
            scene.add(droneGroup);

            updateFromSliders();
            animate();

            window.onresize = () => {
                camera.aspect = container.clientWidth / 500;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, 500);
            };
        }

        function updateFromSliders() {
            const config = {
                armL: parseInt(document.getElementById('armL').value),
                armW: parseInt(document.getElementById('armW').value),
                bodyL: parseInt(document.getElementById('bodyL').value),
                bodyW: parseInt(document.getElementById('bodyW').value)
            };

            // Update textů
            document.getElementById('val-armL').innerText = config.armL;
            document.getElementById('val-armW').innerText = config.armW;
            document.getElementById('val-bodyL').innerText = config.bodyL;
            document.getElementById('val-bodyW').innerText = config.bodyW;

            renderDrone(config);
        }

        function renderDrone(p) {
            while(droneGroup.children.length > 0) droneGroup.remove(droneGroup.children[0]);

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x3b82f6, 
                wireframe: isWireframe,
                shininess: 80 
            });

            // Hlavní deska (Plate)
            const body = new THREE.Mesh(new THREE.BoxGeometry(p.bodyW, 4, p.bodyL), material);
            droneGroup.add(body);

            // Ramena
            const armGeo = new THREE.BoxGeometry(p.armL, 4, p.armW);
            for(let i = 0; i < 2; i++) {
                const arm = new THREE.Mesh(armGeo, material);
                arm.rotation.y = (i === 0) ? Math.PI / 4 : -Math.PI / 4;
                droneGroup.add(arm);
            }

            // Motor Mounts (kolečka na koncích)
            const motorGeo = new THREE.CylinderGeometry(p.armW * 0.8, p.armW * 0.8, 5, 24);
            const dist = (p.armL / 2) * 0.9;
            const positions = [
                [dist, dist], [dist, -dist], [-dist, dist], [-dist, -dist]
            ];

            positions.forEach(pos => {
                const m = new THREE.Mesh(motorGeo, material);
                // Výpočet rotace pro motor mounts aby seděly na ramenech
                const angle = Math.PI / 4;
                const x = pos[0] * Math.cos(angle);
                const z = pos[1] * Math.sin(angle);
                m.position.set(x, 0, z);
                droneGroup.add(m);
            });
        }

        function exportSTL() {
            const exporter = new THREE.STLExporter();
            const result = exporter.parse(droneGroup);
            const blob = new Blob([result], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `drone_frame_${Date.now()}.stl`;
            link.click();
        }

        function toggleWireframe() {
            isWireframe = !isWireframe;
            updateFromSliders();
        }

        function resetCamera() {
            camera.position.set(180, 180, 180);
            controls.target.set(0,0,0);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
