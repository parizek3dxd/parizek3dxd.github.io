<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Drone AI Frame Designer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Roboto',sans-serif; background:#121212; color:white; overflow:hidden; }
#ui {
 position:absolute; top:10px; left:10px; width:280px; background:#1e1e2f; padding:20px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.5); z-index:10;
}
#ui h2 { margin:0 0 10px 0; font-size:20px; color:#22d3ee; }
#ui label { display:block; margin:8px 0 2px 0; font-size:12px; color:#cbd5e1; }
#ui input, #ui select, #ui button { width:100%; margin:4px 0; border-radius:6px; padding:6px; border:none; font-size:14px; }
#ui input[type=range] { cursor:pointer; }
#ui button { background:#22d3ee; color:#000; font-weight:bold; cursor:pointer; transition:0.2s; }
#ui button:hover { background:#0ea5e9; }
</style>
</head>
<body>

<div id="ui">
<h2>Drone AI Frame Designer</h2>

<label>Preset</label>
<select id="preset">
<option value="120">3 inch</option>
<option value="180" selected>5 inch</option>
<option value="250">7 inch</option>
</select>

<label>Velikost</label>
<input id="size" type="range" min="100" max="300" value="180">

<label>Zatížení</label>
<input id="load" type="range" min="10" max="100" value="50">

<label>Organika</label>
<input id="organic" type="range" min="1" max="60" value="25">

<label>Detail</label>
<input id="detail" type="range" min="10" max="40" value="20">

<label>Materiál</label>
<select id="mat">
<option>PLA</option>
<option>PETG</option>
</select>

<button onclick="gen()">🔄 Generovat</button>
<button onclick="exportSTL()">⬇ STL Export</button>
<button onclick="suggestAI()">🧠 AI Návrh</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three-csgmesh@1/build/three-csgmesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three/examples/js/exporters/STLExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script>
// 🌐 THREE.js scéna
let scene=new THREE.Scene();
let cam=new THREE.PerspectiveCamera(70, innerWidth/innerHeight,1,2000);
let ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);
document.body.appendChild(ren.domElement);
cam.position.set(0,0,300);
scene.add(new THREE.AmbientLight(0x404040));
let dl=new THREE.DirectionalLight(0xffffff,1);
dl.position.set(200,200,300);
scene.add(dl);

// 🌟 FRAME
let frame;

// 🔹 MATERIÁL
function getMat(){
 return new THREE.MeshStandardMaterial({color: mat.value==="PLA"?0x60a5fa:0x34d399, roughness:0.5});
}

// 🔹 FEM-lite stress mapa
function stress(x,y,size){
 let d=Math.sqrt(x*x+y*y);
 let center=1-(d/(size/2));
 let motor=(Math.abs(x)>size/3 && Math.abs(y)>size/3)?1:0.5;
 return center*0.7 + motor*0.8;
}

// 🔹 honeycomb CSG
function honey(base,size,t,detail){
 for(let x=-size/2;x<size/2;x+=detail){
  for(let y=-size/2;y<size/2;y+=detail){
   if(stress(x,y,size)>0.65) continue;
   let hex=new THREE.Mesh(new THREE.CylinderGeometry(detail/3,detail/3,t+2,6));
   hex.position.set(x,y,0);
   base=CSG.subtract(base,hex);
  }
 }
 return base;
}

// 🔹 Generativní větve
function branches(size,load,organic){
 let g=new THREE.Group();
 for(let i=0;i<organic;i++){
  let path=new THREE.CatmullRomCurve3([
   new THREE.Vector3(0,0,0),
   new THREE.Vector3((Math.random()-0.5)*size,(Math.random()-0.5)*size,0)
  ]);
  let geo=new THREE.TubeGeometry(path,20,2+load/40,8,false);
  g.add(new THREE.Mesh(geo));
 }
 return g;
}

// 🔹 GENERATOR
function gen(){
 if(frame) scene.remove(frame);
 let s=+size.value, loadVal=+load.value, org=+organic.value, det=+detail.value;
 let t=3+loadVal/40;
 if(mat.value==="PETG") t+=0.5;
 let base=new THREE.Mesh(new THREE.BoxGeometry(s,s,t));
 base=honey(base,s,t,det);
 let br=branches(s,loadVal,org);
 br.children.forEach(b=>{ base=CSG.union(base,b); });
 base.material=getMat();
 let g=new THREE.Group();
 let top=base.clone(); top.position.z=10;
 let bottom=base.clone(); bottom.position.z=-10;
 g.add(top); g.add(bottom);
 frame=g; scene.add(frame);
}

// 🔹 STL export
function exportSTL(){
 let ex=new THREE.STLExporter();
 let data=ex.parse(scene);
 let blob=new Blob([data]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="drone_frame.stl";
 a.click();
}

// 🔹 PSEUDO AI – TensorFlow.js
let model, dataX=[], dataY=[];
async function initAI(){
 model=tf.sequential();
 model.add(tf.layers.dense({units:16,inputShape:[4],activation:'relu'}));
 model.add(tf.layers.dense({units:8,activation:'relu'}));
 model.add(tf.layers.dense({units:3}));
 model.compile({optimizer:'adam',loss:'meanSquaredError'});
}
function evaluate(size,load,organic,detail){
 return load*0.6 + organic*0.2 - (size*0.3 + detail*0.4);
}
function learnSample(size,load,organic,detail){
 let score=evaluate(size,load,organic,detail);
 dataX.push([size,load,organic,detail]);
 dataY.push([size,load,organic]);
 if(dataX.length>20) trainAI();
}
async function trainAI(){
 let xs=tf.tensor2d(dataX), ys=tf.tensor2d(dataY);
 await model.fit(xs,ys,{epochs:10,shuffle:true});
 console.log("AI natrénována");
}
function suggestAI(){
 if(!model) return;
 let input=tf.tensor2d([[+size.value,+load.value,+organic.value,+detail.value]]);
 let pred=model.predict(input);
 let out=pred.dataSync();
 size.value=Math.max(100,Math.min(300,out[0]));
 load.value=Math.max(10,Math.min(100,out[1]));
 organic.value=Math.max(1,Math.min(60,out[2]));
 gen();
}

// 🔹 Eventy
document.querySelectorAll("input,select").forEach(el=>el.oninput=gen);
preset.onchange=e=>{ size.value=e.target.value; gen(); }

// 🔹 Ovládání 3D myš + mobil
let down=false,px=0;
document.onmousedown=e=>{down=true; px=e.clientX;}
document.onmouseup=()=>down=false;
document.onmousemove=e=>{ if(!down||!frame) return; frame.rotation.y+=(e.clientX-px)*0.01; px=e.clientX;}
document.ontouchmove=e=>{ if(frame) frame.rotation.y+=0.02;}

// 🔹 Resize
window.onresize=()=>{ cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); ren.setSize(innerWidth,innerHeight);}

// 🔹 Render loop
function loop(){ requestAnimationFrame(loop); ren.render(scene,cam); }
loop();

// 🔹 Inicializace AI + první generování
initAI(); gen();

// 🔹 Po každém generování učíme AI
let oldGen=gen;
gen=function(){ oldGen(); learnSample(+size.value,+load.value,+organic.value,+detail.value); }
</script>
</body>
</html>
