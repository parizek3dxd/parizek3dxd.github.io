<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Drone Frame Customizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; background: #2d2d2d; border-bottom: 2px solid #444; text-align: center; }
        #container { display: flex; flex: 1; position: relative; overflow: hidden; }
        #sidebar { width: 300px; background: rgba(45, 45, 45, 0.9); padding: 20px; z-index: 10; overflow-y: auto; border-right: 1px solid #444; }
        #viewer { flex: 1; cursor: move; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; color: #bbb; }
        select, input, button { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #3d3d3d; color: white; margin-bottom: 10px; }
        button { background: #007bff; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .stats { background: #222; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; border-left: 3px solid #007bff; }
        @media (max-width: 768px) { #container { flex-direction: column; } #sidebar { width: 100%; height: 40%; border-right: none; border-top: 1px solid #444; } }
    </style>
</head>
<body>

<div id="header">
    <strong>DRONE-GEN v1.0</strong> | 3D Printable Frame Designer
</div>

<div id="container">
    <div id="sidebar">
        <div class="control-group">
            <label>Frame Size Preset</label>
            <select id="preset">
                <option value="75">Tiny Whoop (75mm)</option>
                <option value="150">3.5 Inch (150mm)</option>
                <option value="225" selected>5 Inch (225mm)</option>
                <option value="300">7 Inch (300mm)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Construction Type</label>
            <select id="type">
                <option value="single">Single Plate (Unibody)</option>
                <option value="stack">Stack (2 Plates + Spacers)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Arm Thickness (mm)</label>
            <input type="range" id="thickness" min="2" max="8" value="4" step="0.5">
        </div>

        <div class="control-group">
            <label>Weight Reduction (AI Cutouts)</label>
            <input type="range" id="reduction" min="0" max="1" value="0.5" step="0.1">
        </div>

        <div class="control-group">
            <label>Material (Estimation)</label>
            <select id="material">
                <option value="1.24">PLA (1.24 g/cm³)</option>
                <option value="1.04">ABS (1.04 g/cm³)</option>
                <option value="1.27">PETG (1.27 g/cm³)</option>
            </select>
        </div>

        <div class="stats" id="statsDisplay">
            Est. Weight: -- g<br>
            Print Time: -- min
        </div>
        <br>
        <button onclick="exportSTL()">Download .STL</button>
    </div>
    <div id="viewer"></div>
</div>

<script>
    let scene, camera, renderer, frameMesh, controls;
    const materialDensities = { PLA: 1.24, ABS: 1.04, PETG: 1.27 };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(200, 200, 200);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        // Grid for scale reference
        const grid = new THREE.GridHelper(500, 50, 0x444444, 0x222222);
        scene.add(grid);

        generateFrame();

        // Event Listeners
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', generateFrame);
        });

        window.addEventListener('resize', onWindowResize);
    }

    function generateFrame() {
        if (frameMesh) scene.remove(frameMesh);
        
        const size = parseFloat(document.getElementById('preset').value);
        const thickness = parseFloat(document.getElementById('thickness').value);
        const isStack = document.getElementById('type').value === 'stack';
        const reduction = parseFloat(document.getElementById('reduction').value);

        const frameGroup = new THREE.Group();
        const material = new THREE.MeshPhongMaterial({ color: 0x333333, specular: 0x111111, shininess: 30 });

        // Core logic: Procedural arm generation
        const armWidth = 12 - (reduction * 4);
        const centerSize = size * 0.25;

        // 1. Create Main Plate (or Bottom Plate)
        const plateGeom = createPlateGeometry(size, armWidth, thickness, reduction);
        const plate = new THREE.Mesh(plateGeom, material);
        frameGroup.add(plate);

        // 2. Add Top Plate if "Stack" selected
        if (isStack) {
            const topPlate = plate.clone();
            topPlate.position.y = 20; // 20mm standoff height
            frameGroup.add(topPlate);
            
            // Visual Standoffs
            const standoffGeom = new THREE.CylinderGeometry(2, 2, 20);
            const positions = [[15, 10, 15], [-15, 10, 15], [15, 10, -15], [-15, 10, -15]];
            positions.forEach(pos => {
                const s = new THREE.Mesh(standoffGeom, new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
                s.position.set(pos[0], pos[1], pos[2]);
                frameGroup.add(s);
            });
        }

        frameMesh = frameGroup;
        scene.add(frameMesh);
        updateStats(size, thickness, isStack, reduction);
    }

    function createPlateGeometry(size, armWidth, thickness, reduction) {
        const shape = new THREE.Shape();
        const halfSize = size / 2;
        
        // Simple X-Frame shape logic
        shape.moveTo(-15, -15);
        shape.lineTo(-halfSize, -halfSize + armWidth); // Arm 1
        shape.lineTo(-halfSize + armWidth, -halfSize);
        shape.lineTo(-15, -15);
        
        // For brevity in this demo, we're drawing a procedural X
        const pts = [
            [-halfSize, -halfSize], [halfSize, -halfSize], 
            [halfSize, halfSize], [-halfSize, halfSize]
        ];
        
        // This creates a cross shape
        const s = size/2;
        const w = armWidth;
        const mainShape = new THREE.Shape();
        mainShape.moveTo(-w, -w);
        mainShape.lineTo(-s, -s); mainShape.lineTo(-s+w, -s); mainShape.lineTo(0, -w);
        mainShape.lineTo(s-w, -s); mainShape.lineTo(s, -s); mainShape.lineTo(w, -w);
        mainShape.lineTo(s, s-w); mainShape.lineTo(s, s); mainShape.lineTo(w, w);
        mainShape.lineTo(-s+w, s); mainShape.lineTo(-s, s); mainShape.lineTo(-w, w);
        mainShape.lineTo(-s, s-w);

        const extrudeSettings = { depth: thickness, bevelEnabled: false };
        return new THREE.ExtrudeGeometry(mainShape, extrudeSettings);
    }

    function updateStats(size, thickness, isStack, reduction) {
        const density = parseFloat(document.getElementById('material').value);
        // Simple volume approximation: (Area * Thickness) - reductionFactor
        const baseVolume = (size * thickness * 1.5) * (1 - (reduction * 0.3));
        const totalVolume = isStack ? baseVolume * 2 : baseVolume;
        const weight = (totalVolume / 100).toFixed(2); // Simplified scale
        
        document.getElementById('statsDisplay').innerHTML = `
            Est. Weight: ${weight}g<br>
            Material: ${document.getElementById('material').selectedOptions[0].text.split(' ')[0]}<br>
            Footprint: ${size}mm
        `;
    }

    function exportSTL() {
        const exporter = new THREE.STLExporter();
        const result = exporter.parse(frameMesh, { binary: true });
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `drone_frame_${Date.now()}.stl`;
        link.click();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
