<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Frame Customizer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; }
        #ui { position: absolute; top: 10px; left: 10px; width: 280px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; max-height: 90vh; overflow-y: auto; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        select, input, button { width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; margin-bottom: 5px; }
        button { background: #007bff; cursor: pointer; font-weight: bold; border: none; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .stats { font-size: 11px; color: #00ff88; margin-top: 10px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h3>Drone Customizer</h3>
    
    <div class="control-group">
        <label>Presets</label>
        <select id="preset">
            <option value="5">5 Inch Freestyle</option>
            <option value="3.5">3.5 Inch Cine</option>
            <option value="2">2 Inch Whoop</option>
            <option value="7">7 Inch Long Range</option>
        </select>
    </div>

    <div class="control-group">
        <label>Frame Type</label>
        <select id="frameType">
            <option value="single">Single Plate (True X)</option>
            <option value="stack">Stack (Top + Bottom)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Material (Density calculation)</label>
        <select id="material">
            <option value="1.25">PLA (1.25g/cm³)</option>
            <option value="1.04">ABS (1.04g/cm³)</option>
            <option value="1.27">PETG (1.27g/cm³)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Arm Thickness (mm)</label>
        <input type="range" id="thickness" min="2" max="8" step="0.5" value="4">
        
        <label>Weight Reduction (%)</label>
        <input type="range" id="lighten" min="0" max="50" step="5" value="20">
    </div>

    <div id="weightDisplay" class="stats">Estimated Weight: 0g</div>
    
    <button onclick="exportSTL()">Export .STL for Printing</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLExporter } from 'three/addons/exporters/STLExporter.js';

    let scene, camera, renderer, controls, frameMesh;
    const exporter = new STLExporter();

    init();
    animate();

    function init() {
        // Basic Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(150, 150, 150);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Grid
        const grid = new THREE.GridHelper(200, 20, 0x444444, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        // UI Event Listeners
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', generateFrame);
        });

        generateFrame();
    }

    function generateFrame() {
        if (frameMesh) scene.remove(frameMesh);

        const sizeInch = parseFloat(document.getElementById('preset').value);
        const type = document.getElementById('frameType').value;
        const thickness = parseFloat(document.getElementById('thickness').value);
        const lighten = parseFloat(document.getElementById('lighten').value);
        const density = parseFloat(document.getElementById('material').value);

        const group = new THREE.Group();
        const sizeMm = sizeInch * 25.4;
        const armWidth = 12 - (lighten / 10); // Intelligent arm width reduction

        // Material Visuals
        const matColors = { "1.25": 0xff4400, "1.04": 0x0088ff, "1.27": 0xeeeeee };
        const material = new THREE.MeshPhongMaterial({ color: matColors[density.toString()], flatShading: true });

        // Helper to make a plate
        const createPlate = (zPos) => {
            const shape = new THREE.Shape();
            // Center body
            shape.moveTo(-20, -20);
            shape.lineTo(20, -20);
            shape.lineTo(20, 20);
            shape.lineTo(-20, 20);
            shape.lineTo(-20, -20);

            // Arms (True X Layout)
            const armLen = sizeMm / 2;
            [45, 135, 225, 315].forEach(angle => {
                const rad = angle * Math.PI / 180;
                const s = Math.sin(rad);
                const c = Math.cos(rad);
                
                // Draw Arm
                shape.moveTo(c * 15, s * 15);
                shape.lineTo(c * armLen, s * armLen);
                shape.lineTo(c * armLen + Math.cos(rad + 1.5) * armWidth, s * armLen + Math.sin(rad + 1.5) * armWidth);
                shape.lineTo(c * 15 + Math.cos(rad + 1.5) * armWidth, s * 15 + Math.sin(rad + 1.5) * armWidth);
            });

            const extrudeSettings = { depth: thickness, bevelEnabled: false };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.z = zPos;
            return mesh;
        };

        if (type === 'single') {
            group.add(createPlate(0));
        } else {
            group.add(createPlate(0));
            group.add(createPlate(25)); // 25mm stack height
        }

        frameMesh = group;
        scene.add(frameMesh);

        // Simple Volume Estimation for Weight
        const volumeCm3 = (sizeMm * thickness * 0.1); 
        const weight = (volumeCm3 * density).toFixed(1);
        document.getElementById('weightDisplay').innerText = `Estimated Weight: ${weight}g`;
    }

    window.exportSTL = function() {
        const result = exporter.parse(frameMesh, { binary: true });
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'drone_frame.stl';
        link.click();
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
