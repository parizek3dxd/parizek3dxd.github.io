<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPV Frame Designer PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; touch-action: pan-y; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        #canvas-container { width: 100%; height: 350px; background: #000; border-radius: 12px; position: relative; overflow: hidden; }
        input[type=range] { width: 100%; height: 6px; background: #334155; border-radius: 5px; appearance: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #3b82f6; border-radius: 50%; border: 2px solid #fff; }
        .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #020617; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">FPV FRAME GEN v2.0</h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Industrial Drone Design Tool</p>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <!-- 3D VIEW -->
            <div class="glass p-2">
                <div id="canvas-container">
                    <div id="loader" class="loading-overlay italic text-slate-500 text-sm">Initializing 3D Engine...</div>
                </div>
                <div class="flex justify-between p-2 text-[10px] text-slate-500 font-bold uppercase">
                    <span>1 Finger: Rotate | 2 Fingers: Zoom</span>
                    <button onclick="resetCamera()" class="text-blue-500">Reset View</button>
                </div>
            </div>

            <!-- CONTROLS -->
            <div class="glass p-6 space-y-6">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="applyPreset('5inch')" class="bg-slate-700 py-2 rounded text-xs font-bold active:bg-blue-600">5" FREESTYLE</button>
                    <button onclick="applyPreset('3.5inch')" class="bg-slate-700 py-2 rounded text-xs font-bold active:bg-blue-600">3.5" CINE</button>
                    <button onclick="applyPreset('whoop')" class="bg-slate-700 py-2 rounded text-xs font-bold active:bg-blue-600">WHOOP</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="flex justify-between text-xs text-slate-400 mb-2 font-mono">ARM_LENGTH: <span id="val-armL" class="text-white">140mm</span></label>
                        <input type="range" id="armL" min="50" max="250" value="140" oninput="updateModel()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-2 font-mono">STACK_MOUNT:</label>
                        <select id="stackSize" onchange="updateModel()" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-sm focus:border-blue-500 outline-none">
                            <option value="30.5">30.5 x 30.5 mm (Standard)</option>
                            <option value="20">20.0 x 20.0 mm (Mini)</option>
                            <option value="25.5">25.5 x 25.5 mm (AIO/Whoop)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button onclick="exportSTL()" class="bg-blue-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-900/20">Download STL</button>
                    <button onclick="exportPDF()" class="bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-emerald-900/20">Download PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, frameGroup;
        const loader = document.getElementById('loader');

        function init() {
            try {
                const container = document.getElementById('canvas-container');
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020617);
                
                camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
                camera.position.set(160, 160, 160);

                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    preserveDrawingBuffer: true // Nutné pro PDF export
                });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.touchAction = 'none';

                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(50, 100, 50);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0xffffff, 0.4));

                frameGroup = new THREE.Group();
                scene.add(frameGroup);
                
                // Grid
                const grid = new THREE.GridHelper(300, 20, 0x1e293b, 0x0f172a);
                scene.add(grid);

                loader.style.display = 'none';
                applyPreset('5inch');
                animate();

                window.addEventListener('resize', onWindowResize);
            } catch (e) {
                loader.innerText = "Error: Your browser might not support WebGL.";
                console.error(e);
            }
        }

        function updateModel() {
            const al = parseInt(document.getElementById('armL').value);
            const stack = parseFloat(document.getElementById('stackSize').value);
            
            document.getElementById('val-armL').innerText = al + "mm";

            while(frameGroup.children.length > 0) frameGroup.remove(frameGroup.children[0]);
            
            const mat = new THREE.MeshPhongMaterial({ color: 0x2563eb });
            
            // X-Frame Arms
            const armGeo = new THREE.BoxGeometry(al, 4, al * 0.08);
            for(let i = 0; i < 2; i++) {
                const arm = new THREE.Mesh(armGeo, mat);
                arm.rotation.y = (i === 0) ? Math.PI / 4 : -Math.PI / 4;
                frameGroup.add(arm);
            }

            // Center Plate
            const center = new THREE.Mesh(new THREE.BoxGeometry(stack + 15, 3.5, stack + 15), mat);
            frameGroup.add(center);
        }

        function applyPreset(key) {
            const p = { '5inch': [155, "30.5"], '3.5inch': [115, "20"], 'whoop': [65, "25.5"] }[key];
            document.getElementById('armL').value = p[0];
            document.getElementById('stackSize').value = p[1];
            updateModel();
        }

        function exportSTL() {
            const exporter = new THREE.STLExporter();
            const str = exporter.parse(frameGroup);
            const blob = new Blob([str], { type: 'text/plain' });
            saveAs(blob, 'drone_frame.stl');
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const canvasImg = renderer.domElement.toDataURL("image/png");
            
            doc.setFillColor(15, 23, 42);
            doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.text("FPV FRAME SPEC SHEET", 20, 30);
            
            doc.setFontSize(10);
            doc.text(`ARM LENGTH: ${document.getElementById('armL').value}mm`, 20, 50);
            doc.text(`STACK MOUNT: ${document.getElementById('stackSize').value}mm`, 20, 60);
            
            doc.addImage(canvasImg, 'PNG', 20, 80, 170, 100);
            doc.save("drone_spec.pdf");
        }

        function saveAs(blob, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function resetCamera() {
            camera.position.set(160, 160, 160);
            controls.target.set(0,0,0);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
