<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPV Frame Designer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; touch-action: pan-y; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        #canvas-container { width: 100%; height: 40vh; min-height: 350px; background: #000; border-radius: 12px; position: relative; overflow: hidden; }
        input[type=range] { width: 100%; height: 6px; background: #334155; border-radius: 5px; appearance: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #3b82f6; border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">FPV FRAME GEN</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase">Advanced Carbon Engineering</p>
        </header>

        <div class="grid grid-cols-1 gap-6">
            <!-- 3D PREVIEW -->
            <div class="glass p-2">
                <div id="canvas-container"></div>
                <div class="flex justify-between p-2 text-[9px] text-slate-500 font-bold">
                    <span>TOUCH: ROTATE | PINCH: ZOOM</span>
                    <button onclick="resetCamera()" class="text-blue-500 uppercase">Reset Camera</button>
                </div>
            </div>

            <!-- UI CONTROLS -->
            <div class="glass p-6 space-y-6">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="applyPreset('5inch')" class="bg-slate-800 p-2 rounded text-[10px] font-bold border border-slate-700 active:bg-blue-600">5" INCH</button>
                    <button onclick="applyPreset('3.5inch')" class="bg-slate-800 p-2 rounded text-[10px] font-bold border border-slate-700 active:bg-blue-600">3.5" INCH</button>
                    <button onclick="applyPreset('whoop')" class="bg-slate-800 p-2 rounded text-[10px] font-bold border border-slate-700 active:bg-blue-600">TINY WHOOP</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="flex justify-between text-xs text-slate-400 mb-2">ARM LENGTH: <span id="val-armL" class="text-white font-mono">140mm</span></label>
                        <input type="range" id="armL" min="50" max="260" value="140" oninput="updateModel()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-2 uppercase">Stack Mounting Pattern:</label>
                        <select id="stackSize" onchange="updateModel()" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-sm outline-none focus:border-blue-500">
                            <option value="30.5">30.5 x 30.5 mm (Standard)</option>
                            <option value="20">20.0 x 20.0 mm (Mini)</option>
                            <option value="25.5">25.5 x 25.5 mm (Whoop AIO)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button onclick="exportSTL()" class="bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">Download STL</button>
                    <button onclick="exportPDF()" class="bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">Download PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, droneGroup;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(160, 160, 160);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                preserveDrawingBuffer: true // KRITICKÉ PRO PDF EXPORT
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.touchAction = 'none';

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 200, 100);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            droneGroup = new THREE.Group();
            scene.add(droneGroup);
            scene.add(new THREE.GridHelper(300, 20, 0x1e293b, 0x0f172a));

            applyPreset('5inch');
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function updateModel() {
            const al = parseInt(document.getElementById('armL').value);
            const stack = parseFloat(document.getElementById('stackSize').value);
            document.getElementById('val-armL').innerText = al + "mm";

            while(droneGroup.children.length > 0) droneGroup.remove(droneGroup.children[0]);
            
            const carbonMat = new THREE.MeshPhongMaterial({ color: 0x2563eb, shininess: 80 });
            
            // ARMS (True-X)
            const armGeo = new THREE.BoxGeometry(al, 4, 10);
            for(let i = 0; i < 2; i++) {
                const arm = new THREE.Mesh(armGeo, carbonMat);
                arm.rotation.y = (i === 0) ? Math.PI / 4 : -Math.PI / 4;
                droneGroup.add(arm);
            }

            // CENTER PLATE
            const plateSize = stack + 15;
            const plate = new THREE.Mesh(new THREE.BoxGeometry(plateSize, 3.5, plateSize), carbonMat);
            droneGroup.add(plate);

            // STACK HOLES (Visual Aid)
            const holeGeo = new THREE.CylinderGeometry(1.5, 1.5, 10, 8);
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const hPos = stack / 2;
            [[hPos, hPos], [hPos, -hPos], [-hPos, hPos], [-hPos, -hPos]].forEach(pos => {
                const hole = new THREE.Mesh(holeGeo, holeMat);
                hole.position.set(pos[0], 0, pos[1]);
                droneGroup.add(hole);
            });
        }

        function applyPreset(key) {
            const data = { '5inch': [155, "30.5"], '3.5inch': [115, "20"], 'whoop': [65, "25.5"] }[key];
            document.getElementById('armL').value = data[0];
            document.getElementById('stackSize').value = data[1];
            updateModel();
        }

        // --- EXPORT PDF (Podle tvého zadání) ---
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Tvůj požadovaný základ:
            doc.text("Drone Frame Report", 10, 10);
            
            // Rozšíření o parametry a náhled:
            const canvasImg = renderer.domElement.toDataURL("image/png");
            doc.setFontSize(10);
            doc.text(`Arm Length: ${document.getElementById('armL').value}mm`, 10, 20);
            doc.text(`Stack Pattern: ${document.getElementById('stackSize').value}mm`, 10, 30);
            doc.addImage(canvasImg, 'PNG', 10, 40, 180, 100);
            
            doc.save("report.pdf");
        }

        // --- EXPORT STL (Podle tvého zadání) ---
        function exportSTL() {
            const exporter = new THREE.STLExporter();
            const stlString = exporter.parse(droneGroup); // Exportujeme dron, ne celou scénu

            const blob = new Blob([stlString], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "frame_export.stl";
            link.click();
            URL.revokeObjectURL(link.href);
        }

        function resetCamera() {
            camera.position.set(160, 160, 160);
            controls.target.set(0,0,0);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
